<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartSignal — Live Controller Comparison</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1419; --panel: #1a2129; --border: #2a3441;
    --text: #e6e9ec; --muted: #8b98a5; --accent: #4fc3f7;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; font-size: 14px;
  }
  .controls label { color: var(--muted); margin-right: 4px; }
  select, input[type=number] {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; font-size: 14px;
  }
  input[type=number] { width: 70px; }
  .ctrl-chk { display: flex; gap: 10px; }
  .ctrl-chk label { color: var(--text); cursor: pointer; }
  button {
    background: var(--accent); color: #00222e; font-weight: 600; border: 0;
    border-radius: 6px; padding: 7px 18px; font-size: 14px; cursor: pointer;
  }
  button:disabled { opacity: .4; cursor: default; }
  button.stop { background: #e57373; color: #2e0000; }
  #speedVal { color: var(--accent); min-width: 36px; display: inline-block; }
  .grid { display: flex; flex-wrap: wrap; gap: 16px; }
  .sim-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; width: 348px;
  }
  .sim-panel h3 { font-size: 15px; margin-bottom: 8px; text-transform: capitalize; }
  .sim-panel canvas { background: #131a14; border-radius: 6px; display: block; }
  .stats { display: flex; gap: 14px; margin-top: 8px; font-size: 12.5px; color: var(--muted); }
  .stats b { color: var(--text); font-size: 15px; display: block; }
  .chart-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-top: 18px; height: 300px;
  }
  #status { margin-left: auto; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
  <h1>Smart<span>Signal</span></h1>
  <div class="sub">Same road, same cars, same seed — different signal controllers, side by side.</div>

  <div class="controls">
    <span><label>Demand</label><select id="profile"></select></span>
    <span><label>Seed</label><input id="seed" type="number" value="0" min="0"></span>
    <span class="ctrl-chk" id="ctrls"></span>
    <span><label>Speed</label><input id="speed" type="range" min="1" max="60" value="10">
      <span id="speedVal">10×</span></span>
    <button id="start">Start</button>
    <button id="stop" class="stop" disabled>Stop</button>
    <span id="status">idle</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="chart-panel"><canvas id="chart"></canvas></div>

<script src="/static/app.js"></script>
</body>
</html>
