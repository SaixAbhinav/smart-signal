<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartSignal — Live Controller Comparison</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  /* Pastel system: lavender paper base, white panels, ink text.
     One accent (peach) for actions; rose/apricot/periwinkle/mint encode controllers.
     Shape rule: buttons pill, cards 16px, inputs 10px. Numbers are always mono. */
  :root {
    --paper: #f6f4fa;
    --panel: #ffffff;
    --panel-soft: #fbfaff;
    --border: #e6e2f0;
    --border-strong: #d8d2e8;
    --ink: #38324a;
    --ink-soft: #7b748f;
    --accent: #c8233a;
    --accent-ink: #6e1422;
    --accent-soft: #f9dde2;
    --rose: #e89aa4;
    --apricot: #f0bd8d;
    --periwinkle: #94b4e4;
    --mint: #8fd4ae;
    --shadow: 0 1px 2px rgba(95, 81, 140, 0.05), 0 8px 24px rgba(95, 81, 140, 0.08);
    --shadow-lift: 0 2px 4px rgba(95, 81, 140, 0.07), 0 14px 36px rgba(95, 81, 140, 0.13);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background:
      radial-gradient(900px 500px at 85% -10%, #fde8eb 0%, transparent 60%),
      radial-gradient(800px 520px at -10% 20%, #e9f6ee 0%, transparent 55%),
      radial-gradient(700px 480px at 50% 110%, #e8edfb 0%, transparent 55%),
      var(--paper);
    background-attachment: fixed;
    color: var(--ink);
    font-family: "Outfit", sans-serif;
    padding: 28px clamp(16px, 4vw, 48px) 48px;
    min-height: 100dvh;
  }
  .mono { font-family: "Spline Sans Mono", monospace; }

  /* header */
  header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
  h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; }
  h1 span { color: var(--accent); }
  .sub { color: var(--ink-soft); font-size: 14.5px; margin-bottom: 22px; max-width: 56ch; }

  /* control bar */
  .controls {
    display: flex; flex-wrap: wrap; gap: 12px 22px; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 20px; margin-bottom: 22px;
    font-size: 14px; box-shadow: var(--shadow);
  }
  .controls label { color: var(--ink-soft); margin-right: 6px; font-weight: 500; }
  select, input[type=number] {
    background: var(--panel-soft); color: var(--ink);
    border: 1px solid var(--border-strong); border-radius: 10px;
    padding: 7px 10px; font-size: 14px; font-family: inherit;
    transition: border-color .2s, box-shadow .2s;
  }
  select:focus, input[type=number]:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  input[type=number] { width: 76px; font-family: "Spline Sans Mono", monospace; }
  .ctrl-chk { display: flex; gap: 14px; flex-wrap: wrap; }
  .ctrl-chk label { color: var(--ink); cursor: pointer; display: flex; align-items: center; gap: 6px; margin: 0; font-weight: 500; }
  .ctrl-chk input { accent-color: var(--accent); width: 15px; height: 15px; }

  input[type=range] { accent-color: var(--accent); width: 130px; }
  #speedVal { color: var(--accent-ink); background: var(--accent-soft); border-radius: 999px; padding: 2px 9px; font-size: 12.5px; min-width: 42px; display: inline-block; text-align: center; }

  button {
    border: 0; border-radius: 999px; padding: 9px 26px;
    font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    transition: transform .15s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .2s, filter .2s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: .35; cursor: default; transform: none; }
  #start { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(200, 35, 58, 0.3); }
  #start:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 6px 20px rgba(200, 35, 58, 0.4); }
  #stop { background: var(--panel-soft); color: var(--ink); border: 1px solid var(--border-strong); }
  #stop:hover:not(:disabled) { border-color: var(--rose); color: #b05560; }

  #status { margin-left: auto; color: var(--ink-soft); font-size: 13px; display: flex; align-items: center; gap: 7px; }
  #status.live::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: var(--mint); box-shadow: 0 0 0 0 rgba(143, 212, 174, 0.6);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(143, 212, 174, 0.55); }
    100% { box-shadow: 0 0 0 9px rgba(143, 212, 174, 0); }
  }

  /* live leaderboard */
  #board { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; min-height: 0; }
  .board-chip {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; padding: 7px 16px 7px 9px; font-size: 13.5px;
    box-shadow: var(--shadow); transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .board-chip .swatch { width: 22px; height: 22px; border-radius: 50%; }
  .board-chip b { font-weight: 600; }
  .board-chip .val { color: var(--ink-soft); font-size: 12.5px; }
  .board-chip.leader { border-color: var(--border-strong); background: linear-gradient(120deg, #fff, var(--panel-soft)); }
  .board-chip.leader .tag {
    background: var(--mint); color: #1e4533; border-radius: 999px;
    padding: 2px 9px; font-size: 11px; font-weight: 600;
  }

  /* sim panels */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 18px; }
  .sim-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; box-shadow: var(--shadow);
    transition: transform .25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .25s;
    animation: rise .5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
  }
  .sim-panel:nth-child(2) { animation-delay: .07s; }
  .sim-panel:nth-child(3) { animation-delay: .14s; }
  .sim-panel:nth-child(4) { animation-delay: .21s; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } }
  .sim-panel:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
  .sim-panel h3 {
    font-size: 15px; font-weight: 700; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .sim-panel h3 .dot { width: 11px; height: 11px; border-radius: 50%; }
  .sim-panel canvas { background: var(--panel-soft); border: 1px solid var(--border); border-radius: 12px; display: block; width: 100%; }
  .stats { display: flex; gap: 22px; margin-top: 12px; font-size: 12px; color: var(--ink-soft); }
  .stats b {
    color: var(--ink); font-size: 16px; display: block; font-weight: 600;
    font-family: "Spline Sans Mono", monospace; letter-spacing: -0.02em;
  }

  /* chart */
  .chart-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; margin-top: 20px; height: 320px;
    box-shadow: var(--shadow);
  }

  /* empty state */
  #empty {
    border: 1.5px dashed var(--border-strong); border-radius: 16px;
    padding: 56px 24px; text-align: center; color: var(--ink-soft); font-size: 14.5px;
  }
  #empty b { color: var(--ink); display: block; font-size: 17px; margin-bottom: 6px; font-weight: 700; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
  <header>
    <h1>Smart<span>Signal</span></h1>
  </header>
  <div class="sub">Same road, same cars, same seed. Different signal controllers, racing side by side in real time.</div>

  <div class="controls">
    <span><label>Scenario</label><select id="scenario"></select></span>
    <span><label>Demand</label><select id="profile"></select></span>
    <span><label>Seed</label><input id="seed" type="number" value="0" min="0"></span>
    <span class="ctrl-chk" id="ctrls"></span>
    <span><label>Speed</label><input id="speed" type="range" min="1" max="60" value="10">
      <span id="speedVal" class="mono">10×</span></span>
    <button id="start">Start</button>
    <button id="stop" disabled>Stop</button>
    <span id="status">idle</span>
  </div>

  <div id="board"></div>

  <div class="grid" id="grid">
    <div id="empty" style="grid-column: 1 / -1;">
      <b>Pick your contenders</b>
      Choose a scenario and two or more controllers, then press Start to watch them handle identical traffic.
    </div>
  </div>

  <div class="chart-panel"><canvas id="chart"></canvas></div>

<script src="/static/app.js"></script>
</body>
</html>
